<!-- Backdrop -->
<div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
  <!-- Dialog Container -->
  <div
    class="bg-white rounded-2xl shadow-xl max-w-md w-full transform transition-all animate-fadeIn"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="px-8 py-6 border-b border-gray-100">
      <div class="flex items-start gap-4">
        <!-- Warning Icon -->
        <div class="flex-shrink-0 w-12 h-12 bg-red-50 rounded-full flex items-center justify-center">
          <svg
            class="w-6 h-6 text-red-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            />
          </svg>
        </div>
        <div>
          <h2 class="text-xl font-bold text-gray-900">{{ title }}</h2>
          <p class="text-sm text-gray-500 mt-0.5">This action cannot be undone.</p>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="px-8 py-6">
      <p class="text-gray-700 text-sm leading-relaxed">
        {{ message }}
        <span *ngIf="itemName" class="font-semibold text-gray-900">&nbsp;{{ itemName }}</span>?
      </p>
    </div>

    <!-- Footer -->
    <div
      class="px-8 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-3 rounded-b-2xl"
    >
      <button
        (click)="onCancel()"
        [disabled]="isDeleting"
        class="px-5 py-2 text-gray-700 font-medium hover:bg-gray-100 rounded-lg transition-colors disabled:opacity-50"
      >
        Cancel
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="isDeleting"
        class="px-5 py-2 bg-red-600 text-white font-medium hover:bg-red-700 rounded-lg transition-colors disabled:opacity-50 flex items-center gap-2"
      >
        <span
          *ngIf="isDeleting"
          class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"
        ></span>
        {{ isDeleting ? 'Deleting...' : confirmLabel }}
      </button>
    </div>
  </div>
</div>
