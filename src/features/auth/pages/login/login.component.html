<div class="min-h-screen flex relative">
  <!-- Full Screen Background Image -->
  <div class="absolute inset-0 z-0">
    <img
      src="assets/toprec-bg.jpg"
      alt="Lagos Skyline"
      class="h-full w-full object-cover"
    />
  </div>

  <!-- Left Side - Sign In Form with White Overlay -->
  <div
    class="w-full lg:w-1/2 flex items-center justify-center px-6 py-12 relative z-10 bg-white/75 backdrop-blur-sm"
  >
    <div class="w-full max-w-md">
      <!-- Logo and Title -->
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-6">
          <img src="assets/toprec_logo.png" alt="TOPREC Logo" />
        </div>
        <h2 class="text-3xl font-bold text-gray-800">Sign In</h2>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="errorMessage"
        class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg"
      >
        <p class="text-sm text-red-600">{{ errorMessage }}</p>
      </div>

      <!-- Sign In Form -->
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email/Identifier Field -->
        <div>
          <label
            for="identifier"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Email / RTP Number
          </label>
          <input
            type="text"
            id="identifier"
            formControlName="identifier"
            placeholder="Enter your email or RTP number"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a5632] focus:border-transparent outline-none transition-all duration-200"
            [class.border-red-500]="identifier?.invalid && identifier?.touched"
          />
          <div *ngIf="identifier?.invalid && identifier?.touched" class="mt-1">
            <p
              *ngIf="identifier?.errors?.['required']"
              class="text-xs text-red-500"
            >
              Email or username is required
            </p>
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Password
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a5632] focus:border-transparent outline-none transition-all duration-200 pr-12"
              [class.border-red-500]="password?.invalid && password?.touched"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
              title="Toggle password visibility"
            >
              <svg
                *ngIf="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
              <svg
                *ngIf="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>
            </button>
          </div>
          <div *ngIf="password?.invalid && password?.touched" class="mt-1">
            <p
              *ngIf="password?.errors?.['required']"
              class="text-xs text-red-500"
            >
              Password is required
            </p>
            <p
              *ngIf="password?.errors?.['minlength']"
              class="text-xs text-red-500"
            >
              Password must be at least 6 characters
            </p>
          </div>
        </div>

        <!-- Forgot Password Link -->
        <div class="text-left">
          <button
            type="button"
            (click)="navigateToForgotPassword()"
            class="text-sm text-[#1a5632] hover:text-[#2a7642] font-medium transition-colors"
          >
            Forgot Password?
          </button>
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-3 px-4 bg-[#1a5632] text-white font-semibold rounded-lg hover:bg-[#2a7642] focus:outline-none focus:ring-2 focus:ring-[#1a5632] focus:ring-offset-2 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
        >
          <span *ngIf="!isLoading">Sign in</span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg
              class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Signing in...
          </span>
        </button>

        <!-- Sign Up Link -->
        <div class="text-center text-sm text-gray-600">
          Don't have an account?
          <button
            type="button"
            (click)="navigateToSignUp()"
            class="text-[#1a5632] hover:text-[#2a7642] font-semibold transition-colors ml-1"
          >
            Sign up
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Right Side - Transparent (shows background image) -->
  <div class="hidden lg:block lg:w-1/2 relative z-10">
    <!-- Optional: Add a subtle gradient overlay if needed -->
    <div
      class="absolute inset-0 bg-gradient-to-br from-[#1a5632]/10 to-transparent"
    ></div>
  </div>
</div>
