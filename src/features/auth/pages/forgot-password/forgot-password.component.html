<div class="min-h-screen flex relative">
  <!-- Full Screen Background Image - FIXED -->
  <div class="fixed inset-0 z-0">
    <img
      src="assets/toprec-bg.jpg"
      alt="Lagos Skyline"
      class="h-full w-full object-cover"
    />
  </div>

  <!-- Left Side - Forgot Password Form with White Overlay -->
  <div
    class="w-full lg:w-1/2 flex items-center justify-center px-6 py-8 relative z-10 bg-white/75 backdrop-blur-sm"
  >
    <div class="w-full max-w-md">
      <!-- Logo and Title -->
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-6">
          <img src="assets/Toprec_Title_and_Logo.png" alt="TOPREC Logo" />
        </div>
        <h2 class="text-3xl font-bold text-gray-800">Reset Password</h2>
        <p class="text-gray-600 text-sm mt-2">
          Enter your email to receive a password reset link
        </p>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="errorMessage"
        class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2"
      >
        <svg
          class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          />
        </svg>
        <p class="text-sm text-red-600">{{ errorMessage }}</p>
      </div>

      <!-- Success Message -->
      <div
        *ngIf="successMessage"
        class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg flex items-start gap-2"
      >
        <svg
          class="w-5 h-5 text-green-500 flex-shrink-0 mt-0.5"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd"
          />
        </svg>
        <p class="text-sm text-green-600">{{ successMessage }}</p>
      </div>

      <!-- Forgot Password Form -->
      <form
        *ngIf="!emailSent"
        [formGroup]="forgotPasswordForm"
        (ngSubmit)="onSubmit()"
        class="space-y-6"
      >
        <!-- Email Field -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Email Address *
          </label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="username@toprecng.org"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a5632] focus:border-transparent outline-none transition-all duration-200"
            [class.border-red-500]="email?.invalid && email?.touched"
          />
          <div *ngIf="email?.invalid && email?.touched" class="mt-1">
            <p *ngIf="email?.errors?.['required']" class="text-xs text-red-500">
              Email is required
            </p>
            <p *ngIf="email?.errors?.['email']" class="text-xs text-red-500">
              Please enter a valid email
            </p>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full px-4 py-3 bg-[#1a5632] text-white rounded-lg font-semibold hover:bg-[#2a7642] transition-colors duration-200 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <span *ngIf="!isLoading">Send Reset Link</span>
          <span *ngIf="isLoading" class="flex items-center gap-2">
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Sending...
          </span>
        </button>
      </form>

      <!-- Back to Sign In Link -->
      <p class="text-center text-gray-600 text-sm mt-6">
        Remember your password?
        <button
          type="button"
          (click)="navigateToSignIn()"
          class="text-[#1a5632] hover:text-[#2a7642] font-semibold transition-colors"
        >
          Sign in here
        </button>
      </p>
    </div>
  </div>

  <!-- Right Side - Background (Hidden on mobile) -->
  <div
    class="hidden lg:flex w-1/2 bg-gradient-to-br from-[#1a5632] to-[#0d2e17] items-center justify-center"
  >
    <div class="text-white text-center">
      <h3 class="text-2xl font-bold mb-2">Reset Your Password</h3>
      <p class="text-white/80">Secure your TOPREC account</p>
    </div>
  </div>
</div>
