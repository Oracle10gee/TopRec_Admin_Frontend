<div class="min-h-screen flex relative">
  <!-- Full Screen Background Image - FIXED -->
  <div class="fixed inset-0 z-0">
    <img
      src="assets/toprec-bg.jpg"
      alt="Lagos Skyline"
      class="h-full w-full object-cover"
    />
  </div>

  <!-- Left Side - OTP Form with White Overlay -->
  <div
    class="w-full lg:w-1/2 flex items-center justify-center px-6 py-8 relative z-10 bg-white/75 backdrop-blur-sm"
  >
    <div class="w-full max-w-md">
      <!-- Logo and Title -->
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-6">
          <img src="assets/toprec_logo.png" alt="TOPREC Logo" />
        </div>
        <h2 class="text-3xl font-bold text-gray-800">Verify OTP</h2>
        <p class="text-gray-600 text-sm mt-2">
          Enter the 6-digit code sent to your email
        </p>
        <p *ngIf="identifier" class="text-[#1a5632] text-sm font-medium mt-1">
          {{ identifier }}
        </p>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="errorMessage"
        class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2"
      >
        <svg
          class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          />
        </svg>
        <p class="text-sm text-red-600">{{ errorMessage }}</p>
      </div>

      <!-- Success Message -->
      <div
        *ngIf="successMessage"
        class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg flex items-start gap-2"
      >
        <svg
          class="w-5 h-5 text-green-500 flex-shrink-0 mt-0.5"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd"
          />
        </svg>
        <p class="text-sm text-green-600">{{ successMessage }}</p>
      </div>

      <!-- OTP Form -->
      <form
        [formGroup]="otpForm"
        (ngSubmit)="onSubmit()"
        class="space-y-6"
      >
        <!-- OTP Field -->
        <div>
          <label
            for="otp"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            OTP Code <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="otp"
            formControlName="otp"
            placeholder="Enter 6-digit OTP"
            maxlength="6"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a5632] focus:border-transparent outline-none transition-all duration-200 text-center text-2xl tracking-[0.5em] font-semibold"
            [class.border-red-500]="otp?.invalid && otp?.touched"
          />
          <div *ngIf="otp?.invalid && otp?.touched" class="mt-1">
            <p *ngIf="otp?.errors?.['required']" class="text-xs text-red-500">
              OTP is required
            </p>
            <p *ngIf="otp?.errors?.['minlength'] || otp?.errors?.['maxlength']" class="text-xs text-red-500">
              OTP must be exactly 6 digits
            </p>
            <p *ngIf="otp?.errors?.['pattern']" class="text-xs text-red-500">
              OTP must contain only numbers
            </p>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full px-4 py-3 bg-[#1a5632] text-white rounded-lg font-semibold hover:bg-[#2a7642] transition-colors duration-200 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <span *ngIf="!isLoading">Verify OTP</span>
          <span *ngIf="isLoading" class="flex items-center gap-2">
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Verifying...
          </span>
        </button>
      </form>

      <!-- Resend OTP -->
      <div class="text-center mt-6">
        <p class="text-gray-600 text-sm">
          Didn't receive the code?
          <button
            type="button"
            (click)="resendOtp()"
            [disabled]="isResending"
            class="text-[#1a5632] hover:text-[#2a7642] font-semibold transition-colors disabled:opacity-50"
          >
            <span *ngIf="!isResending">Resend OTP</span>
            <span *ngIf="isResending">Resending...</span>
          </button>
        </p>
      </div>

      <!-- Navigation Links -->
      <div class="flex items-center justify-between mt-4">
        <button
          type="button"
          (click)="navigateToForgotPassword()"
          class="text-sm text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Back
        </button>
        <button
          type="button"
          (click)="navigateToSignIn()"
          class="text-sm text-[#1a5632] hover:text-[#2a7642] font-semibold transition-colors"
        >
          Sign in instead
        </button>
      </div>
    </div>
  </div>

  <!-- Right Side - Transparent (shows background image) -->
  <div class="hidden lg:block lg:w-1/2 relative z-10">
    <div
      class="absolute inset-0 bg-gradient-to-br from-[#1a5632]/10 to-transparent"
    ></div>
  </div>
</div>
