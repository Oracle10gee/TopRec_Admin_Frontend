<div class="max-w-7xl mx-auto animate-fadeIn">
  <!-- Header Section -->
  <div class="mb-8">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <!-- Title & Description -->
      <div>
        <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-[#1a5632] to-[#0d3520] rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </div>
          Members Directory
        </h1>
        <p class="text-gray-600 mt-2 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          Manage and view all TOPREC organization members
        </p>
      </div>

      <!-- Quick Stats -->
      <div class="flex items-center gap-3">
        <div class="px-4 py-3 bg-blue-50 border border-blue-200 rounded-xl">
          <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <div>
              <p class="text-xs text-blue-600 font-medium">Total Members</p>
              <p class="text-lg font-bold text-blue-700">{{ getTotalCount() }}</p>
            </div>
          </div>
        </div>

        <div class="px-4 py-3 bg-green-50 border border-green-200 rounded-xl">
          <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div>
              <p class="text-xs text-green-600 font-medium">Active</p>
              <p class="text-lg font-bold text-green-700">{{ getActiveCount() }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modern Tabs Navigation -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6 overflow-hidden">
    <div class="flex p-2 gap-2 bg-gray-50">
      <!-- Members Tab -->
      <button
        (click)="setActiveTab('members')"
        [ngClass]="
          activeTab === 'members'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div 
          [ngClass]="activeTab === 'members' ? 'bg-green-100' : 'bg-gray-100 group-hover:bg-gray-200'"
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg 
            class="w-5 h-5"
            [ngClass]="activeTab === 'members' ? 'text-green-600' : 'text-gray-600'"
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <span>Members</span>
        <span 
          [ngClass]="activeTab === 'members' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'"
          class="px-2 py-0.5 text-xs font-bold rounded-full"
        >
          {{ getMembersCount() }}
        </span>
      </button>

      <!-- Consulting Firm Tab -->
      <button
        (click)="setActiveTab('consulting')"
        [ngClass]="
          activeTab === 'consulting'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div 
          [ngClass]="activeTab === 'consulting' ? 'bg-green-100' : 'bg-gray-100 group-hover:bg-gray-200'"
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg 
            class="w-5 h-5"
            [ngClass]="activeTab === 'consulting' ? 'text-green-600' : 'text-gray-600'"
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
        </div>
        <span>Consulting Firms</span>
        <span 
          [ngClass]="activeTab === 'consulting' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'"
          class="px-2 py-0.5 text-xs font-bold rounded-full"
        >
          {{ getConsultingCount() }}
        </span>
      </button>

      <!-- Practice Firm Tab -->
      <button
        (click)="setActiveTab('practice')"
        [ngClass]="
          activeTab === 'practice'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div 
          [ngClass]="activeTab === 'practice' ? 'bg-green-100' : 'bg-gray-100 group-hover:bg-gray-200'"
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg 
            class="w-5 h-5"
            [ngClass]="activeTab === 'practice' ? 'text-green-600' : 'text-gray-600'"
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <span>Practice Firms</span>
        <span 
          [ngClass]="activeTab === 'practice' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'"
          class="px-2 py-0.5 text-xs font-bold rounded-full"
        >
          {{ getPracticeCount() }}
        </span>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="animate-slideIn">
    <app-members-list *ngIf="activeTab === 'members'"></app-members-list>
    <app-consulting-firm *ngIf="activeTab === 'consulting'"></app-consulting-firm>
    <app-practice-firm *ngIf="activeTab === 'practice'"></app-practice-firm>
  </div>
</div>
