<div class="space-y-6 animate-fadeIn">
  <!-- Simple Action Bar -->
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-semibold text-gray-900">Members</h2>
    
    <div class="flex items-center gap-3">
      <!-- <button
        (click)="addNewMember()"
        class="px-4 py-2 bg-[#1a5632] text-white text-sm font-medium rounded-lg hover:bg-[#2a7642] transition-colors"
      >
        Add Member  
      </button> -->
      
      <button
        (click)="openFilter()"
        class="p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors"
        title="Filter"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Clean Search Bar -->
  <div class="relative">
    <form [formGroup]="filterForm">
      <input
        type="text"
        formControlName="searchTerm"
        placeholder="Search members..."
        class="w-full px-4 py-3 pl-11 bg-white border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:border-[#1a5632] transition-colors"
      />
      <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </form>
  </div>

  <!-- Minimal Table -->
  <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="border-b border-gray-200">
          <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Member
          </th>
          <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Contact
          </th>
          <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            RTP Number
          </th>
          <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Status
          </th>
          <th class="px-6 py-4 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr
          *ngFor="let member of filteredMembers"
          class="hover:bg-gray-50 transition-colors"
        >
          <!-- Member -->
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-sm font-medium text-gray-600">
                {{ getInitials(member.name) }}
              </div>
              <div>
                <p class="text-sm font-medium text-gray-900">{{ member.name }}</p>
                <p class="text-xs text-gray-500">Town Planner</p>
              </div>
            </div>
          </td>

          <!-- Contact -->
          <td class="px-6 py-4">
            <p class="text-sm text-gray-900">{{ member.email }}</p>
            <p class="text-xs text-gray-500">{{ member.mobile }}</p>
          </td>

          <!-- RTP Number -->
          <td class="px-6 py-4">
            <p class="text-sm font-mono text-gray-900">{{ member.id }}</p>
          </td>

          <!-- Status -->
          <td class="px-6 py-4">
            <span
              [ngClass]="member.status === 'Active' ? 'bg-green-50 text-green-700' : 'bg-gray-100 text-gray-600'"
              class="inline-flex px-2.5 py-1 text-xs font-medium rounded-full"
            >
              {{ member.status }}
            </span>
          </td>

          <!-- Actions -->
          <td class="px-6 py-4">
            <div class="flex items-center justify-end gap-2">
              <button
                (click)="viewMember(member)"
                class="p-1.5 text-gray-400 hover:text-gray-600 transition-colors"
                title="View"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>

              <button
                (click)="editMember(member)"
                class="p-1.5 text-gray-400 hover:text-gray-600 transition-colors"
                title="Edit"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>

              <button
                (click)="deleteMember(member)"
                class="p-1.5 text-gray-400 hover:text-red-600 transition-colors"
                title="Delete"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty State -->
    <div *ngIf="filteredMembers.length === 0" class="text-center py-16">
      <svg class="mx-auto w-12 h-12 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 6a3 3 0 11-6 0 3 3 0 016 0zM15 16a6 6 0 11-12 0 6 6 0 0112 0z"/>
      </svg>
      <p class="text-sm text-gray-500">No members found</p>
    </div>

    <!-- Simple Pagination -->
    <div *ngIf="filteredMembers.length > 0" class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
      <p class="text-sm text-gray-600">
        {{ filteredMembers.length }} of {{ members.length }} members
      </p>
      <div class="flex items-center gap-1">
        <button class="px-3 py-1 text-sm text-gray-600 hover:text-gray-900 disabled:opacity-50" disabled>
          Previous
        </button>
        <button class="px-3 py-1 text-sm bg-[#1a5632] text-white rounded">
          1
        </button>
        <button class="px-3 py-1 text-sm text-gray-600 hover:text-gray-900">
          2
        </button>
        <button class="px-3 py-1 text-sm text-gray-600 hover:text-gray-900">
          Next
        </button>
      </div>
    </div>
  </div>
</div>
