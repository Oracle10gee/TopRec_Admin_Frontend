<div class="max-w-5xl mx-auto animate-fadeIn">
  <!-- Header Section -->
  <div class="mb-8">
    <div
      class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
    >
      <!-- Title & Description -->
      <div>
        <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-[#1a5632] to-[#0d3520] rounded-xl flex items-center justify-center"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
          </div>
          Settings
        </h1>
        <p class="text-gray-600 mt-2 flex items-center gap-2">
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
            />
          </svg>
          Manage your account preferences and security settings
        </p>
      </div>

      <!-- Quick Actions -->
      <div class="flex items-center gap-3">
        <button
          (click)="resetAllSettings()"
          class="px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg font-medium hover:border-[#1a5632] hover:text-[#1a5632] hover:bg-green-50 transition-all duration-200 flex items-center gap-2"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            />
          </svg>
          Reset All
        </button>
      </div>
    </div>
  </div>

  <!-- Modern Tabs Navigation -->
  <div
    class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6 overflow-hidden"
  >
    <div class="flex p-2 gap-2 bg-gray-50">
      <!-- Security Settings Tab -->
      <button
        (click)="setActiveTab('security')"
        [ngClass]="
          activeTab === 'security'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div
          [ngClass]="
            activeTab === 'security'
              ? 'bg-green-100'
              : 'bg-gray-100 group-hover:bg-gray-200'
          "
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg
            class="w-5 h-5"
            [ngClass]="
              activeTab === 'security' ? 'text-green-600' : 'text-gray-600'
            "
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
        </div>
        <span>Security Settings</span>
      </button>

      <!-- Notification Settings Tab -->
      <button
        (click)="setActiveTab('notifications')"
        [ngClass]="
          activeTab === 'notifications'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div
          [ngClass]="
            activeTab === 'notifications'
              ? 'bg-green-100'
              : 'bg-gray-100 group-hover:bg-gray-200'
          "
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg
            class="w-5 h-5"
            [ngClass]="
              activeTab === 'notifications' ? 'text-green-600' : 'text-gray-600'
            "
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            />
          </svg>
        </div>
        <span>Notifications</span>
        <span
          *ngIf="hasUnreadNotifications()"
          class="px-2 py-0.5 text-xs font-bold bg-red-500 text-white rounded-full animate-pulse"
        >
          New
        </span>
      </button>

      <!-- Payment Settings Tab (Superadmin Only) -->
      <button
        *ngIf="isTabVisible('payments')"
        (click)="setActiveTab('payments')"
        [ngClass]="
          activeTab === 'payments'
            ? 'bg-white text-[#1a5632] shadow-sm'
            : 'text-gray-600 hover:text-gray-900 hover:bg-white/50'
        "
        class="group flex-1 px-6 py-3.5 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2"
      >
        <div
          [ngClass]="
            activeTab === 'payments'
              ? 'bg-green-100'
              : 'bg-gray-100 group-hover:bg-gray-200'
          "
          class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
        >
          <svg
            class="w-5 h-5"
            [ngClass]="
              activeTab === 'payments' ? 'text-green-600' : 'text-gray-600'
            "
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <span>Payments</span>
      </button>

    </div>
  </div>

  <!-- Tab Content with Animation -->
  <div class="animate-slideIn">
    <app-security-settings
      *ngIf="activeTab === 'security'"
    ></app-security-settings>

    <app-notification-settings
      *ngIf="activeTab === 'notifications'"
    ></app-notification-settings>

    <!-- Users tab content — commented out for Superadmin -->
    <!--
    <app-users-settings *ngIf="activeTab === 'users'"></app-users-settings>
    -->

    <app-payment-settings
      *ngIf="activeTab === 'payments'"
    ></app-payment-settings>

  <!-- Settings Overview (Only on Security Tab) -->
  <div *ngIf="activeTab === 'security'" class="mt-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Last Password Change -->
      <div
        class="bg-gradient-to-r from-blue-50 to-cyan-50 border-2 border-blue-200 rounded-xl p-4"
      >
        <div class="flex items-start gap-3">
          <div
            class="flex-shrink-0 w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-blue-600 uppercase">
              Last Password Change
            </p>
            <p class="text-lg font-bold text-blue-900 mt-1">
              {{ getLastPasswordChange() }}
            </p>
          </div>
        </div>
      </div>

      <!-- Account Security -->
      <div
        class="bg-gradient-to-r from-green-50 to-emerald-50 border-2 border-green-200 rounded-xl p-4"
      >
        <div class="flex items-start gap-3">
          <div
            class="flex-shrink-0 w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
              />
            </svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-green-600 uppercase">
              Security Status
            </p>
            <p class="text-lg font-bold text-green-900 mt-1">Strong</p>
          </div>
        </div>
      </div>

      <!-- Active Sessions -->
      <div
        class="bg-gradient-to-r from-purple-50 to-pink-50 border-2 border-purple-200 rounded-xl p-4"
      >
        <div class="flex items-start gap-3">
          <div
            class="flex-shrink-0 w-10 h-10 bg-purple-500 rounded-lg flex items-center justify-center"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              />
            </svg>
          </div>
          <div>
            <p class="text-xs font-semibold text-purple-600 uppercase">
              Active Sessions
            </p>
            <p class="text-lg font-bold text-purple-900 mt-1">
              {{ getActiveSessions() }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
