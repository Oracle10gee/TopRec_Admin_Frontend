<aside
  class="fixed md:sticky inset-y-0 left-0 z-40 w-64 h-screen bg-gradient-to-b from-[#1a5632] via-[#155229] to-[#0d3520] text-white shadow-2xl flex flex-col transition-transform duration-300 ease-in-out md:translate-x-0"
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
>
  <!-- Logo Section -->
  <div class="px-6 py-6 border-b border-white/10 bg-white/5">
    <div class="flex items-center gap-3">
      <!-- <div class="relative">
        
      </div> -->
      <div class="flex-1">
        <img
          src="assets/toprec_logo.png"
          alt="TOPREC Logo"
          class="w-50 h-12 object-contain animate-fadeIn"
        />
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto custom-scrollbar">
    <div *ngFor="let item of menuItems" class="group">
      <button
        [routerLink]="item.route"
        routerLinkActive="active-menu-item"
        (click)="onMenuItemClick(item)"
        class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200 relative overflow-hidden hover:bg-white/10 hover:translate-x-1"
        [ngClass]="{ 
          'bg-white/20 shadow-md': activeMenuItem === item.id,
          'hover:shadow-sm': activeMenuItem !== item.id
        }"
      >
        <!-- Active Indicator -->
        <span 
          class="absolute left-0 top-0 bottom-0 w-1 bg-white rounded-r-full transition-all duration-200"
          [class.opacity-100]="activeMenuItem === item.id"
          [class.opacity-0]="activeMenuItem !== item.id"
        ></span>

        <!-- Icon -->
        <span class="text-xl flex-shrink-0 transition-transform duration-200 group-hover:scale-110">
          <svg class="w-5 h-5" [innerHTML]="item.icon"></svg>
        </span>

        <!-- Label -->
        <span class="font-medium text-sm pl-5">{{ item.label }}</span>

        <!-- Badge (payments pending count) -->
        <!-- <span
          *ngIf="item.id === 'payments' && pendingPaymentCount > 0"
          class="ml-auto px-2 py-0.5 text-xs font-semibold rounded-full bg-red-500 text-white"
        >
          {{ pendingPaymentCount }}
        </span> -->
      </button>
    </div>
  </nav>

  <!-- User Section -->
  <div class="border-t border-white/10 px-3 py-4 bg-white/5">
    <!-- User Info -->
    <div class="px-4 py-3 mb-2 rounded-lg bg-white/10 backdrop-blur-sm">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full shadow-md overflow-hidden flex-shrink-0">
          <img
            *ngIf="profileImageUrl"
            [src]="profileImageUrl"
            alt="Profile photo"
            class="w-full h-full object-cover"
            (error)="profileImageUrl = null"
          />
          <div
            *ngIf="!profileImageUrl"
            class="w-full h-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white font-bold text-sm"
          >
            {{ getUserInitials() }}
          </div>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold truncate">{{ getUserName() }}</p>
          <p class="text-xs text-green-200 truncate">{{ getUserRole() }}</p>
        </div>
      </div>
    </div>

    <!-- Logout Button -->
    <button
      (click)="onLogout()"
      class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-lg bg-red-600/20 hover:bg-red-600/30 text-red-200 font-medium transition-all duration-200 hover:shadow-md group"
    >
      <svg class="w-5 h-5 transition-transform duration-200 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span class="text-sm">Logout</span>
    </button>
  </div>
</aside>
